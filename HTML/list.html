<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--Unorder list tag-->
    <ul>
        <li>Home</li>
        <li>Contact</li>
        <li>Blog</li>
        <li>About</li>
    </ul>
    
    <!--Order list tag-->
    <ol>
        <li>Home</li>
        <li>Contact</li>
        <li>Blog</li>
        <li>About</li>
    </ol>
    
    <!--Description list tag-->
    <dl>
        <dt>Coffee</dt> <!--Data term/element-->
        <dd>Black Coffee</dd> <!--Data description-->
        <dd>Green Coffee</dd>
        <dd>Cold Coffee</dd>
    </dl>
</body>
</html>
