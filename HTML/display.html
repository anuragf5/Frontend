<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
        margin: 0;
        padding: 0;
    }

    .block{
        height: 100px;
        width: 100px;
        background-color: black;
        border: 1px solid yellow;
        margin: 10px;
        display: block;
    }

    .inline{
        background-color: black;
        color: white;
        margin: 10px;
        display: inline;
        padding: 16px;
    }
    
    .b_inline{
        width: 300px;
        background-color: black;
        color: white;
        margin: 10px;
        display: inline-block;
        padding: 16px;
    }
    </style>
    
</head>
<body>
    
    <!-- Block Element -->
    <div class="block"></div>
    <div class="block"></div>
    <div class="block"></div>
    
    <br><br><br>
    
    <!-- Inline Element -->
    <div class="inline">This is inline tag</div>
    <div class="inline">This is inline tag</div>
    <div class="inline">This is inline tag</div>
    
    <br><br><br><br>

    <!-- Block Inline Element -->
    <div class="b_inline">This is block inline tag</div>
    <div class="b_inline">This is block inline tag</div>
    <div class="b_inline">This is block inline tag</div>
</body>
</html>
